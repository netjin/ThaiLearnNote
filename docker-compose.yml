services:
  learn-thai-note:
    build: .
    ports:
      - "5173:5173"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      PORT: ${PORT:-5173}
      DATA_DIR: /app/data
      SESSION_SECRET: ${SESSION_SECRET:-}
    volumes:
      - thai-learn-note-data:/app/data
    restart: unless-stopped

volumes:
  thai-learn-note-data:
